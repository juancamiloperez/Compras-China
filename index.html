// ============ STORAGE ============
// Persistencia con fallback inteligente:
//   1) window.storage (Claude.ai artifacts - solo en ese entorno)
//   2) localStorage (navegador local - lo normal cuando abres el archivo)
const STORAGE_PREFIX = 'imp_';
const storage = {
    async get(key, fallback) {
        try {
            // Intentar window.storage primero (Claude.ai)
            if (typeof window !== 'undefined' && window.storage && window.storage.get) {
                const r = await window.storage.get(key);
                if (r && r.value)
                    return JSON.parse(r.value);
            }
            // Fallback a localStorage (navegador local)
            if (typeof localStorage !== 'undefined') {
                const v = localStorage.getItem(STORAGE_PREFIX + key);
                if (v !== null)
                    return JSON.parse(v);
            }
        }
        catch (e) {
            console.warn('Storage get failed for', key, e);
        }
        return fallback;
    },
    async set(key, value) {
        try {
            if (typeof window !== 'undefined' && window.storage && window.storage.set) {
                await window.storage.set(key, JSON.stringify(value));
                return true;
            }
            if (typeof localStorage !== 'undefined') {
                localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
                return true;
            }
        }
        catch (e) {
            console.warn('Storage set failed for', key, e);
            // QuotaExceededError: informar a la app vía evento
            if (e.name === 'QuotaExceededError' || e.code === 22 || (e.message && e.message.toLowerCase().includes('quota'))) {

                    window.dispatchEvent(new CustomEvent('imp-storage-full', { detail: { key } }));

// Redimensiona una imagen para que ocupe menos espacio en localStorage
// (las fotos de tarjetas/productos en base64 pueden tomar mucho espacio).
const resizeImage = (dataUrl, maxWidth = 1024, quality = 0.75) => {
    return new Promise((resolve) => {
        if (!dataUrl) {
            resolve(dataUrl);
            return;
        }
        const img = new Image();
        img.onload = () => {
            try {
                const canvas = document.createElement('canvas');
                let w = img.width;
                let h = img.height;
                if (w > maxWidth) {
                    h = Math.round((h * maxWidth) / w);
                    w = maxWidth;
                }
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            }
            catch (e) {
                resolve(dataUrl);
            }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
    });
};

// ============ CAMERA / OCR ============
const CameraCapture = ({ onCapture, onClose, label = 'Tomar foto' }) => {
    const videoRef = useRef(null);
    const canvasRef = useRef(null);
    const streamRef = useRef(null);
    const [error, setError] = useState('');
    useEffect(() => {
        (async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' } }
                });
                streamRef.current = stream;
                if (videoRef.current)
                    videoRef.current.srcObject = stream;
            }
            catch (e) {
                setError('No se pudo acceder a la cámara. Permite el acceso o usa "Subir archivo".');
            }
        })();
        return () => {
            if (streamRef.current)
                streamRef.current.getTracks().forEach(t => t.stop());

            return;

// Traduce texto del chino al español.
// Estrategia: 1) Apps Script (LanguageApp) si gasUrl está disponible (mejor calidad)
//             2) MyMemory API (gratis, sin auth) como fallback
//             3) Devuelve original si todo falla
const translateText = async (text, gasUrl) => {
    if (!text || !text.trim())
        return text;
    // Si no hay caracteres chinos, no traducir
    if (!/[\u4e00-\u9fa5]/.test(text))
        return text;
    // Estrategia 1: Apps Script
    if (gasUrl) {
        try {
            const url = gasUrl + '?action=translate&text=' + encodeURIComponent(text) + '&to=es';
            const res = await fetch(url);
            const data = await res.json();
            if (data.translated && !data.error)
                return data.translated;
        }
        catch (e) {
            console.warn('Translate via GAS failed', e);
        }
    }
    // Estrategia 2: MyMemory (gratis, soporta CORS, ~10k caracteres/día)
    try {
        const url = 'https://api.mymemory.translated.net/get?q=' +
            encodeURIComponent(text) + '&langpair=zh-CN|es';
        const res = await fetch(url);
        const data = await res.json();
        const translated = data.responseData && data.responseData.translatedText;
        if (translated && translated.toLowerCase() !== text.toLowerCase())
            return translated;
    }
    catch (e) {
        console.warn('MyMemory translate failed', e);
    }
    return text;
};
const parseBusinessCard = (text) => {
    const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 1);
    const fullText = text;
    const result = {
        nombre: '', nombreOriginal: '',
        wechat: '', telefono: '', email: '',
        ubicacion: '', ubicacionOriginal: '',
        tienda: '',
        puerta: '', piso: '', calle: '', zona: '',
        rawText: text
    };
    // ---- Email
    const emailMatch = fullText.match(/[\w.+-]+@[\w-]+\.[\w.-]+/i);
    if (emailMatch)
        result.email = emailMatch[0];
    // ---- WeChat
    const wechatPatterns = [
        /微信号[\s:：]*([A-Za-z0-9_-]+)/,
        /微信[\s:：]+([A-Za-z0-9_-]+)/,
        /WeChat[\s:：]*([A-Za-z0-9_-]+)/i,
        /wx[\s:：]+([A-Za-z0-9_-]+)/i
    ];
    for (const re of wechatPatterns) {
        const m = fullText.match(re);
        if (m && m[1].length >= 6) {
            result.wechat = m[1];
            break;
        }
    }
    // ---- Teléfono chino: 11 dígitos comenzando con 1
    const phoneRegex = /1[3-9]\d[\s-]?\d{4}[\s-]?\d{4}/g;
    const allPhones = (fullText.match(phoneRegex) || [])
        .map(p => p.trim())
        .filter(p => p.replace(/\D/g, '').length === 11);
    const phoneNotWechat = allPhones.find(p => p.replace(/\D/g, '') !== result.wechat);
    if (phoneNotWechat)
        result.telefono = phoneNotWechat;
    if (!result.wechat && allPhones.length > 0) {
        result.wechat = allPhones[0].replace(/\D/g, '');
    }
    // ---- Número de tienda: PRIORIDAD a formato Letra-Número (B4-9203, H2-23899B)
    const tiendaPatterns = [
        /([A-Z]\d+\s*-\s*\d+[A-Z]?)/, // B4-9203, H2-23899B (más prioritario)
        /NO\.\s*([A-Z]\d+[-]?\d+[A-Z]?)/i, // NO. H2-23899B
        /(\d{4,5})\s*店/, // 11913店
        /No\.\s*(\d{4,5})/i, // No.11913
        /(\d{4,5})号(?!\s*门)/, // 11630号 (no "号门")
        /Shop\s+([A-Z0-9]+)/i // Shop 5
    ];
    for (const re of tiendaPatterns) {
        const m = fullText.match(re);
        if (m && m[1]) {
            result.tienda = m[1].replace(/\s+/g, '').trim();
            break;
        }
